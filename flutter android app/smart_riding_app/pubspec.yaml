name: smart_riding_app
description: Smart riding companion app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI组件
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.4.9

  # BLE蓝牙
  flutter_blue_plus: ^1.32.0

  # 网络与数据
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI增强
  fl_chart: ^0.66.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.0.1

  # 工具库
  uuid: ^4.3.3
  intl: ^0.19.0
  equatable: ^2.0.5
  go_router: ^13.1.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
